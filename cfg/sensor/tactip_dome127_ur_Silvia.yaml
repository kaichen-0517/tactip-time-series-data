name: tactip-127
camera:
  source: 2
  exposure: 10
  width: 1920 # 1920 # 640 # 1024 # 1280
  height: 1080 # 1080 # 480 # 768 # 960
  fps: 120.0

process_images:
  visualise_on: true
  crop: [663, 442, 496]
  circle_mask_radius: 496
  single_channel: red
  led_masks: [[148,282, 73], [262,830, 89], [788,956, 61], [1174,606, 71], [1048,80, 73]]

process_markers:
  visualise_on: false
  num_markers: 127
  num_rings: 7
  backbone_offset_deg: 0
  edge_index_file: edge_index_hex_n7.npy

  detector_type: CVConnectedComponent
  image_scale: 1
  detector_kwargs:
    morphology_ksize: 13
    size_filter: [0.5, 4]
    binary_threshold: [51, -26]
    

