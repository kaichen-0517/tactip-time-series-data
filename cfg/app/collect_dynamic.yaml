# @package _global_

defaults:
  - /runtime/base
  - /collect: surface_zRxy_ur_Jason # surface_z_ur_Silvia
  - /ft_sensor: ati
  - _self_

collect:
  name: surface-zRxy-June22-Jason-repeated-p2
  # sample_nums: 1000
  experiment: ${collect.robot}/${sensor.name}/${collect.name}
  ip: 192.168.1.164
  fixed_speed: false
  classic_data: false

sensor:
  name: tactip-127
  camera:
    camera_name: /dev/video0 # /dev/video0 # video=HD USB Camera
    exposure: 10
    width: 1920 # 1920 # 640 # 1024 # 1280
    height: 1080 # 1080 # 480 # 768 # 960
    fps: 120.0
    writer_workers: 8 # Concurrent image writers (increase carefully)
    png_compression: 1
    storage_format: zip # png # zip
  process_images:
    greyscale_on: false


