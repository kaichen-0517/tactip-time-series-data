name: pix2pix128
n_epochs: 200
# early_stopping: 20

loss_wt_gan_pix: [1.0, 100.0]
n_save: 5

generator_kwargs:
  in_channels: 1
  out_channels: 1
  unet_down: [64, 128, 256, 512, 512, 512, 512]
  dropout_down: [0.0, 0.0, 0.0, 0.5, 0.5, 0.5, 0.5]
  normalise_down: [False, True, True, True, True, True, False]
  unet_up: [0, 512, 512, 512, 256, 128, 64]
  dropout_up: [0.5, 0.5, 0.5, 0.5, 0.0, 0.0, 0.0]

discriminator_kwargs:
  in_channels: 1
  disc_block: [64, 128, 256, 512]
  normalise_disc: [False, True, True, True]

loader:
  batch_size: 32
  shuffle: true
  num_workers: 1

optimizer:
  lr: 0.0001
  betas: [0.9, 0.999]
  weight_decay: 0.000001
  
scheduler: ReduceLROnPlateau
lr_scheduler:
  factor: 0.5
  patience: 10

preprocess:
  dims: [128, 128]
  normlz: true
  globals: ${globals}

augment:
  rshift: null
