name: graph_edge
n_epochs: 100

kwargs:
  conv_layers: [64, 64, 128, 256]
  emb_dims: 1024
  fc_layers: [512, 256]
  dropout: 0.0
  apply_batchnorm: True

loader:
  batch_size: 128
  shuffle: true
  num_workers: 0

optimizer:
  lr: 0.001
  betas: [0.9, 0.999]
  weight_decay: 0.000001

scheduler: ReduceLROnPlateau
lr_scheduler:
  factor: 0.5
  patience: 3

preprocess:
  data_type: nodes # nodes areas nodes_areas
  feature_names: {x: ["nodes", "areas"]}
  num_markers: ${sensor.process_markers.num_markers}
